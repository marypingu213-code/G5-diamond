<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>第一課：Level 3 語詞拖曳挑戰</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { background-color: #34495e; padding: 30px; border-radius: 20px; width: 90%; max-width: 1000px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 上方語詞區 */
        .word-bank { background: #1a252f; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; border: 3px dashed #f1c40f; }
        .word-item { background: #f1c40f; color: #2c3e50; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 24px; cursor: grab; user-select: none; }
        .word-item:active { cursor: grabbing; }

        /* 題目區 */
        .quiz-area { text-align: left; }
        .question { font-size: 22px; margin: 20px 0; line-height: 2; display: flex; align-items: center; flex-wrap: wrap; }
        
        /* 放置空格 */
        .drop-zone { width: 120px; height: 40px; border-bottom: 3px solid #f1c40f; margin: 0 10px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 5px; transition: 0.3s; }
        .drop-zone.over { background: rgba(241, 196, 15, 0.3); transform: scale(1.1); }
        .drop-zone.filled { background: transparent; border-bottom: none; }
        
        .check-btn { background-color: #27ae60; color: white; border: none; padding: 15px 40px; font-size: 24px; border-radius: 50px; cursor: pointer; margin-top: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="game-container">
    <h2>💎 第一課：Level 3 語詞拖曳填空 💎</h2>
    
    <div class="word-bank" id="wordBank">
        </div>

    <div class="quiz-area">
        <div class="question">1. 晚飯後，全家人一起在<div class="drop-zone" data-ans="客廳"></div>聊天。</div>
        <div class="question">2. 古時候沒有電燈，人們只能靠著<div class="drop-zone" data-ans="燈盞"></div>來照明。</div>
        <div class="question">3. 園丁正在花園裡辛苦地為花草<div class="drop-zone" data-ans="灑水"></div>。</div>
        <div class="question">4. 奶奶用漂亮的<div class="drop-zone" data-ans="茶壺"></div>泡了一壺熱茶。</div>
        <div class="question">5. 秋天到了，公園裡的<div class="drop-zone" data-ans="菊花"></div>全都盛開了。</div>
        <div class="question">6. 多<div class="drop-zone" data-ans="閱讀"></div>優良讀物，可以增加我們的知識。</div>
        <div class="question">7. 我家<div class="drop-zone" data-ans="附近"></div>有一座大操場，大家常去運動。</div>
        <div class="question">8. 妹妹睜大亮晶晶的<div class="drop-zone" data-ans="眼眸"></div>，好奇地看著櫥窗。</div>
        <div class="question">9. 要離開母校，大家心裡都充滿了<div class="drop-zone" data-ans="留戀"></div>。</div>
    </div>

    <button class="check-btn" onclick="checkAll()">檢查答案</button>
</div>

<script>
    const words = ["客廳", "燈盞", "灑水", "茶壺", "菊花", "閱讀", "附近", "眼眸", "留戀"];
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lesson') || "1";

    // 初始化：打亂語詞順序並放入語詞庫
    const wordBank = document.getElementById('wordBank');
    words.sort(() => Math.random() - 0.5).forEach(w => {
        const div = document.createElement('div');
        div.className = 'word-item';
        div.innerText = w;
        div.draggable = true;
        div.id = 'word-' + w;
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', w));
        wordBank.appendChild(div);
    });

    // 設定拖曳目標區邏輯
    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('over');
        });
        zone.addEventListener('dragleave', () => zone.classList.remove('over'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('over');
            const word = e.dataTransfer.getData('text');
            
            // 如果原本有字，放回語詞庫
            if (zone.innerText !== "") {
                addBackToBank(zone.innerText);
            }
            
            zone.innerText = word;
            zone.classList.add('filled');
            // 從語詞庫移除
            const item = document.getElementById('word-' + word);
            if (item) item.style.display = 'none';
        });

        // 點擊空格可以把字收回去
        zone.onclick = () => {
            if (zone.innerText !== "") {
                addBackToBank(zone.innerText);
                zone.innerText = "";
                zone.classList.remove('filled');
            }
        };
    });

    function addBackToBank(word) {
        const item = document.getElementById('word-' + word);
        if (item) item.style.display = 'block';
    }

    function checkAll() {
        let correctCount = 0;
        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(zone => {
            if (zone.innerText === zone.dataset.ans) {
                zone.style.color = "#2ecc71";
                correctCount++;
            } else {
                zone.style.color = "#e74c3c";
            }
        });

        if (correctCount === zones.length) {
            localStorage.setItem(`level4_unlocked_lesson_${lessonId}`, 'true');
            alert("🎉 太棒了！鑽石變色了！趕快回大廳看看！");
            location.href = 'index.html';
        } else {
            alert("還有幾題放錯位置了，再試試看！");
        }
    }
</script>
</body>
</html>
