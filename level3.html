<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>第一課：Level 3 語詞拖曳挑戰</title>
    <style>
        :root { --primary-bg: #2c3e50; --container-bg: #34495e; --word-bg: #f1c40f; --drop-bg: rgba(255, 255, 255, 0.1); --correct-color: #2ecc71; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--primary-bg); color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { background-color: var(--container-bg); padding: 40px; border-radius: 30px; width: 95%; max-width: 1200px; display: inline-block; box-shadow: 0 15px 50px rgba(0,0,0,0.5); border: 4px solid #455a64; }
        h2 { font-size: 42px; color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 30px; }
        .word-bank { background: #1a252f; padding: 25px; border-radius: 20px; margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; border: 4px dashed #f1c40f; min-height: 100px; }
        .word-item { background: var(--word-bg); color: #2c3e50; padding: 15px 30px; border-radius: 15px; font-weight: 900; font-size: 32px; cursor: grab; user-select: none; box-shadow: 0 6px 0 #d4ac0d; }
        .quiz-area { text-align: left; background: rgba(0,0,0,0.1); padding: 30px; border-radius: 20px; }
        .question { font-size: 28px; margin: 25px 0; line-height: 1.8; display: flex; align-items: center; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .drop-zone { min-width: 160px; height: 60px; border: 3px dashed #f1c40f; margin: 5px 15px; display: inline-flex; align-items: center; justify-content: center; background: var(--drop-bg); border-radius: 12px; transition: 0.3s; font-size: 32px; color: #f1c40f; }
        .drop-zone.over { background: rgba(241, 196, 15, 0.4); transform: scale(1.1); }
        .drop-zone.filled { background: #ffffff; color: #2c3e50; border: none; border-bottom: 6px solid #bdc3c7; }
        .check-btn { background-color: var(--correct-color); color: white; border: none; padding: 20px 60px; font-size: 32px; border-radius: 60px; cursor: pointer; margin-top: 40px; font-weight: 900; box-shadow: 0 8px 0 #27ae60; }
    </style>
</head>
<body>
<div class="game-container">
    <h2>💎 第一課：Level 3 語詞拖曳挑戰 💎</h2>
    <div class="word-bank" id="wordBank"></div>
    <div class="quiz-area">
        <div class="question">1. 晚飯後，全家人一起在<div class="drop-zone" data-ans="客廳"></div>聊天。</div>
        <div class="question">2. 古時候沒有電燈，人們只能靠著<div class="drop-zone" data-ans="燈盞"></div>來照明。</div>
        <div class="question">3. 園丁正在花園裡辛苦地為花草<div class="drop-zone" data-ans="灑水"></div>。</div>
        <div class="question">4. 奶奶用漂亮的<div class="drop-zone" data-ans="茶壺"></div>泡了一壺香醇的熱茶。</div>
        <div class="question">5. 秋天到了，公園裡的<div class="drop-zone" data-ans="菊花"></div>全都盛開了。</div>
        <div class="question">6. 多<div class="drop-zone" data-ans="閱讀"></div>優良讀物，可以增加我們的知識。</div>
        <div class="question">7. 我家<div class="drop-zone" data-ans="附近"></div>有一座大操場，大家常去運動。</div>
        <div class="question">8. 妹妹睜大亮晶晶的<div class="drop-zone" data-ans="眼眸"></div>，好奇地看著櫥窗。</div>
        <div class="question">9. 要離開相處六年的母校，心裡充滿了<div class="drop-zone" data-ans="留戀"></div>。</div>
    </div>
    <button class="check-btn" onclick="checkAll()">檢查答案 檢查看看</button>
</div>
<script>
    const words = ["客廳", "燈盞", "灑水", "茶壺", "菊花", "閱讀", "附近", "眼眸", "留戀"];
    const lessonId = new URLSearchParams(window.location.search).get('lesson') || "1";
    const wordBank = document.getElementById('wordBank');
    
    // 隨機打亂陣列順序
    const shuffledWords = words.sort(() => Math.random() - 0.5);
    
    shuffledWords.forEach(w => {
        const div = document.createElement('div');
        div.className = 'word-item'; div.innerText = w; div.draggable = true; div.id = 'word-' + w;
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', w));
        wordBank.appendChild(div);
    });

    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('over'));
        zone.addEventListener('drop', e => {
            e.preventDefault(); zone.classList.remove('over');
            const word = e.dataTransfer.getData('text');
            if (zone.innerText !== "") addBackToBank(zone.innerText);
            zone.innerText = word; zone.classList.add('filled');
            document.getElementById('word-' + word).style.display = 'none';
        });
        zone.onclick = () => { if (zone.innerText !== "") { addBackToBank(zone.innerText); zone.innerText = ""; zone.classList.remove('filled'); } };
    });
    function addBackToBank(word) { document.getElementById('word-' + word).style.display = 'block'; }
    function checkAll() {
        let correct = 0;
        document.querySelectorAll('.drop-zone').forEach(z => {
            if (z.innerText === z.dataset.ans) { z.style.backgroundColor = "#2ecc71"; z.style.color = "white"; correct++; }
            else { z.style.backgroundColor = "#e74c3c"; z.style.color = "white"; }
        });
        if (correct === 9) {
            localStorage.setItem(`level4_unlocked_lesson_${lessonId}`, 'true');
            alert("太棒了！全對！Level 4 已解鎖，鑽石變色囉！");
            location.href = 'index.html';
        } else alert("還有地方放錯了，再檢查一下紅色的格子！");
    }
</script>
</body>
</html>
