                "這片深山之中， @ 著許多珍貴的礦產。",
                "秋天是收穫的季節，農夫們正忙著在田裡 @ 稻子。",
                "奶奶正坐在窗邊，細心地為我 @ 一件溫暖的毛衣。",
                "在北極地區，人們常利用狗拉 @ 作為交通工具。",
                "這場及時雨 @ 了乾枯的大地，草木都變得有精神了。",
                "生病時一定要依照醫生的指示服用 @ ，病才會快點好。",
                "運動過後，適度的 @ 可以幫助肌肉放鬆，減輕痠痛。",
                "請大家在考卷的右上角，清楚寫下自己的座號 @ 。",
                " @ 氣象預報顯示，明天全台各地都會是晴朗的好天氣。",
                "老師正在講台上宣布今天語文 @ 的範圍。",
                "海邊的沙灘上布滿了各種形狀的 @ ，踩上去涼涼的。",
                "班長做事一向很 @ ，所以老師非常信任他。",
                "飲食要均衡，如果攝取過多的 @ ，對身體會有負擔。",
                "郵差叔叔準時將外婆寄來的 @ 送到我們家門口。",
                "「一寸光陰一寸金」是一句非常有名的 @ ，提醒我們要珍惜時間。",
                "高大挺拔的神木，靜靜地 @ 在雲霧繚繞的深山森林中。"
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('id') || "1";
    const currentData = lessonData[lessonId];
    
    // 返回按鈕設定
    document.getElementById('backLink').href = `lesson.html?id=${lessonId}`;

    // 分頁設定：每頁最多 9 題
    const ITEMS_PER_PAGE = 9;
    let currentPage = 0;
    let totalPages = 1;
    let currentWords = [];
    let currentQuestions = [];

    if (currentData) {
        document.getElementById('lesson-title').innerText = currentData.title;
        totalPages = Math.ceil(currentData.words.length / ITEMS_PER_PAGE);
        loadPage(0);
    } else {
        document.getElementById('lesson-title').innerText = "找不到這課的資料喔！";
        document.getElementById('checkBtn').style.display = 'none';
    }

    function loadPage(pageIndex) {
        currentPage = pageIndex;
        
        // 顯示進度
        if(totalPages > 1) {
            document.getElementById('progressText').innerText = `第 ${currentPage + 1} / ${totalPages} 關`;
        } else {
            document.getElementById('progressText').innerText = "";
        }

        // 裁切當頁的資料
        const startIdx = currentPage * ITEMS_PER_PAGE;
        const endIdx = startIdx + ITEMS_PER_PAGE;
        currentWords = currentData.words.slice(startIdx, endIdx);
        currentQuestions = currentData.questions.slice(startIdx, endIdx);

        // 清空並重新渲染語詞庫
        const wordBank = document.getElementById('wordBank');
        wordBank.innerHTML = "";
        [...currentWords].sort(() => Math.random() - 0.5).forEach(w => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.innerText = w;
            div.draggable = true;
            div.id = 'word-' + w;
            div.addEventListener('dragstart', e => e.dataTransfer.setData('text', w));
            wordBank.appendChild(div);
        });

        // 清空並重新渲染題目區
        const quizArea = document.getElementById('quizArea');
        quizArea.innerHTML = "";
        currentQuestions.forEach((q, index) => {
            const parts = q.split('@');
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            // 題號會接續上一頁 (例如 10, 11, 12...)
            const questionNum = startIdx + index + 1;
            qDiv.innerHTML = `${questionNum}. ${parts[0]} <div class="drop-zone" data-ans="${currentWords[index]}"></div> ${parts[1]}`;
            quizArea.appendChild(qDiv);
        });

        // 重新綁定拖曳邏輯
        setupDragAndDrop();
        
        // 按鈕文字重置
        document.getElementById('checkBtn').innerText = "檢查答案 檢查看看";
    }

    function setupDragAndDrop() {
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('over'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('over');
                const word = e.dataTransfer.getData('text');
                
                // 只有從底下的語詞庫拉上來的字才能放
                if(document.getElementById('word-' + word)) {
                    if (zone.innerText !== "") {
                        document.getElementById('word-' + zone.innerText).style.display = 'block';
                    }
                    zone.innerText = word;
                    zone.classList.add('filled');
                    document.getElementById('word-' + word).style.display = 'none';
                }
            });
            zone.onclick = () => {
                if (zone.innerText !== "") {
                    document.getElementById('word-' + zone.innerText).style.display = 'block';
                    zone.innerText = "";
                    zone.classList.remove('filled');
                    zone.style.backgroundColor = "rgba(255, 255, 255, 0.1)"; // 恢復原本底色
                    zone.style.color = "#f1c40f"; // 恢復原本字色
                }
            };
        });
    }

    function checkAll() {
        let correct = 0;
        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(z => {
            if (z.innerText === z.dataset.ans) {
                z.style.backgroundColor = "#2ecc71";
                z.style.color = "white";
                correct++;
            } else {
                z.style.backgroundColor = "#e74c3c";
                z.style.color = "white";
            }
        });

        if (correct === zones.length && zones.length > 0) {
            if (currentPage < totalPages - 1) {
                alert("🎉 太棒了！這頁全對！準備進入下一關！");
                loadPage(currentPage + 1);
            } else {
                localStorage.setItem(`level4_unlocked_lesson_${lessonId}`, 'true');
                alert("🎉 太棒了！全部挑戰完成！鑽石變色囉！");
                location.href = `lesson.html?id=${lessonId}`;
            }
        } else {
            alert("還有地方不對喔，再檢查一下紅色的格子！點擊紅格子可以把字退回去喔。");
        }
    }
</script>
