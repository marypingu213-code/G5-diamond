<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>第五年級：Level 3 語詞我最行</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #2c3e50; color: white; text-align: center; }
        .game-container { background-color: #34495e; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; width: 80%; max-width: 800px; }
        .question { font-size: 22px; margin: 20px 0; text-align: left; background: #2c3e50; padding: 15px; border-radius: 8px; border-left: 5px solid #f1c40f; }
        select { font-size: 18px; padding: 5px; border-radius: 5px; background: #f1c40f; font-weight: bold; cursor: pointer; }
        .check-btn { background-color: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .check-btn:hover { background-color: #2ecc71; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="game-container">
    <h2 id="lesson-title">🎯 Level 3：語詞填空 (前半)</h2>
    <p>請根據句子意思選擇正確的語詞：</p>
    <hr>
    
    <div id="quiz-area">
        <div class="question">1. 晚飯後，全家人一起在（ <select id="q1"><option value="">請選擇</option><option value="客廳">客廳</option><option value="燈盞">燈盞</option></select> ）聊天。</div>
        <div class="question">2. 古時候沒有電燈，人們只能靠著（ <select id="q2"><option value="">請選擇</option><option value="燈盞">燈盞</option><option value="茶壺">茶壺</option></select> ）來照明。</div>
        <div class="question">3. 園丁正在花園裡辛苦地為花草（ <select id="q3"><option value="">請選擇</option><option value="灑水">灑水</option><option value="閱讀">閱讀</option></select> ）。</div>
        <div class="question">4. 奶奶用漂亮的（ <select id="q4"><option value="">請選擇</option><option value="茶壺">茶壺</option><option value="附近">附近</option></select> ）泡了一壺香醇的熱茶。</div>
        <div class="question">5. 秋天到了，公園裡的（ <select id="q5"><option value="">請選擇</option><option value="菊花">菊花</option><option value="眼眸">眼眸</option></select> ）全都盛開了。</div>
        <div class="question">6. 多（ <select id="q6"><option value="">請選擇</option><option value="閱讀">閱讀</option><option value="留戀">留戀</option></select> ）優良的課外讀物，可以增加我們的知識。</div>
        <div class="question">7. 我家（ <select id="q7"><option value="">請選擇</option><option value="附近">附近</option><option value="客廳">客廳</option></select> ）有一座大操場，大家常去那裡運動。</div>
        <div class="question">8. 妹妹睜大亮晶晶的（ <select id="q8"><option value="">請選擇</option><option value="眼眸">眼眸</option><option value="灑水">灑水</option></select> ），好奇地看著櫥窗。</div>
        <div class="question">9. 要離開相處六年的母校，大家心裡都充滿了（ <select id="q9"><option value="">請選擇</option><option value="留戀">留戀</option><option value="燈盞">燈盞</option></select> ）。</div>
    </div>

    <button class="check-btn" onclick="checkAnswers()">送出答案 檢查看看</button>
</div>

<script>
    // 答案定義
    const correctAnswers = {
        q1: "客廳", q2: "燈盞", q3: "灑水", q4: "茶壺", q5: "菊花",
        q6: "閱讀", q7: "附近", q8: "眼眸", q9: "留戀"
    };

    // 自動獲取目前的課程 ID (從網址列抓取 ?lesson=1)
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lesson') || "1"; // 如果抓不到，預設為第一課

    function checkAnswers() {
        let score = 0;
        let total = Object.keys(correctAnswers).length;

        for (let key in correctAnswers) {
            const el = document.getElementById(key);
            if (el.value === correctAnswers[key]) {
                score++;
                el.style.backgroundColor = "#2ecc71"; // 對了變綠色
                el.style.color = "white";
            } else {
                el.style.backgroundColor = "#e74c3c"; // 錯了變紅色
                el.style.color = "white";
            }
        }

        if (score === total) {
            // --- 重點修正：對應首頁的檢查標籤 ---
            const storageKey = `level4_unlocked_lesson_${lessonId}`;
            localStorage.setItem(storageKey, 'true');
            
            alert("太棒了！全對！Level 4 已解鎖，請回大廳挑戰！");
            location.href = 'index.html'; 
        } else {
            alert("還有地方寫錯喔，再檢查一下紅色的部分！");
        }
    }
</script>
</body>
</html>
