<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一關：部件拼拼樂 (高對比深色版)</title>
    <script src="data.js"></script>
    <style>
        /* 讓 body 直接成為黑底，徹底滿版，拿掉多餘的邊界 */
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #1a1a1a; /* 深鐵灰色，保護眼睛 */
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        /* 取代原本的 canvas-16-9，變為自由彈性的大容器 */
        .main-container { 
            width: 100%; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 4%; 
            box-sizing: border-box; 
        }

        .header-area { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
        }
        
        h1 { 
            color: #FFD700; 
            font-size: clamp(30px, 3.5vw, 50px); 
            margin: 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }
        
        .header-btns { display: flex; gap: 15px; z-index: 50; }
        
        /* 導覽按鈕放大 */
        .back-btn { 
            background-color: #333333; 
            color: #ffffff; 
            text-decoration: none; 
            font-size: clamp(16px, 1.5vw, 24px); 
            font-weight: bold; 
            padding: 12px 25px; 
            border-radius: 50px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
            transition: 0.2s; 
            border: 2px solid #555; 
            display: flex; 
            align-items: center;
        }
        .back-btn:hover { background-color: #555555; transform: scale(1.05); }
        
        .home-btn { background-color: #1565c0; border: 2px solid #0d47a1; }
        .home-btn:hover { background-color: #0d47a1; }

        /* 目標字提示放大 */
        .target-hint { 
            font-size: clamp(28px, 3vw, 40px); 
            color: #ffffff; 
            background: #222222; 
            padding: 15px 40px; 
            border-radius: 50px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.5); 
            display: inline-block; 
            margin-bottom: 40px; 
            border: 2px solid #444; 
        }
        #target-word { color: #ff9800; font-weight: bold; font-size: 1.2em;}

        /* 遊戲區域放大，間距拉開，讓雙框盡情展開 */
        .game-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: stretch; /* 讓兩個框框一樣高 */
            flex-wrap: wrap; 
            gap: 5vw; 
            width: 100%; 
            max-width: 1600px;
            flex-grow: 1; 
        }
        
        /* 巨無霸拼圖框 */
        .box { 
            flex: 1;
            min-width: 350px;
            max-width: 600px; /* 寬度上限大幅放寬 */
            min-height: 500px; /* 高度變高 */
            background: #ffffff; 
            border-radius: 25px; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }
        
        .parts-pool { border: 6px dashed #888; background-color: #f8f9fa;} 
        .drop-zone { border: 6px solid #ff5252; }
        
        .box-title { 
            width: 100%; 
            padding: 15px 0; 
            text-align: center; 
            font-size: clamp(24px, 2vw, 30px); 
            font-weight: bold; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5; 
            pointer-events: none; 
        }
        .pool-title { background: #444444; color: #ffffff; border-top-left-radius: 18px; border-top-right-radius: 18px; } 
        .zone-title { background: #d32f2f; color: #ffffff; border-top-left-radius: 18px; border-top-right-radius: 18px; }
        
        #pool { 
            display: flex; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            justify-content: center; 
            padding-top: 80px; 
            height: 100%; 
            box-sizing: border-box; 
            gap: 15px; /* 部件之間的間距加大 */
        }
        
        /* 部件圖片基礎大小放大 (從130px升級為180px) */
        .part-img { 
            width: 180px; 
            height: 180px; 
            object-fit: contain; 
            cursor: grab; 
            transition: transform 0.1s ease; 
            z-index: 10; 
            touch-action: none; 
        }
        #pool .part-img { 
            position: relative !important; 
            left: auto !important; 
            top: auto !important; 
            margin: 10px; 
            background-color: #ffffff; 
            border: 3px solid #eaeaea; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .part-img:active { cursor: grabbing; transform: scale(1.15); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        
        #zone-guide { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: clamp(30px, 3vw, 45px); 
            color: #cccccc; 
            font-weight: bold; 
            pointer-events: none; 
            width: 80%; 
            text-align: center; 
        }
        
        .status-area { 
            min-height: 100px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 3vw; 
            margin-top: 40px; 
            width: 100%; 
        }
        
        #message { 
            font-size: clamp(30px, 3vw, 45px); 
            color: #4CAF50; 
            font-weight: bold; 
            margin: 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }
        
        #next-btn { 
            font-size: clamp(24px, 2vw, 36px); 
            padding: 20px 50px; 
            background-color: #4CAF50; 
            color: white; 
            border: 4px solid #388E3C; 
            border-radius: 60px; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 8px 0 #2e7d32; 
            font-weight: bold; 
            transition: 0.1s;
        }
        #next-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #2e7d32; }

        @media (max-width: 768px) {
            .header-area { flex-direction: column; gap: 20px; }
            .box { min-height: 400px; } 
            #pool { padding-top: 70px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-area">
            <h1>🧩 第一關：部件拼拼樂</h1>
            <div class="header-btns">
                <a href="index.html" class="back-btn home-btn">🏠 回總大廳</a>
                <a href="#" id="back-btn" class="back-btn">🔙 回課程選單</a>
            </div>
        </div>
        <div class="target-hint">目標：<span id="target-word">字</span></div>
        <div class="game-wrapper">
            <div class="box parts-pool" id="pool"><div class="box-title pool-title">1️⃣ 點住並拖曳</div></div>
            <div class="box drop-zone" id="zone"><div class="box-title zone-title">2️⃣ 放到這裡組裝</div><p id="zone-guide">把部件丟進來</p></div>
        </div>
        <div class="status-area"><div id="message"></div><button id="next-btn" onclick="nextWord()">我拼好了 ➡️</button></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1"; 
        document.getElementById('back-btn').href = `lesson.html?id=${lessonId}`;
        const wordData = allLessonsData[lessonId] ? allLessonsData[lessonId].level1 : [];

        let gameWords = [], currentIdx = 0, placedCount = 0;
        let activePart = null, offsetX = 0, offsetY = 0;
        
        // 🌟 這裡配合 CSS 放大，把基礎大小提升到了 180
        const BASE_PART_SIZE = 180; 

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            } return array;
        }

        function startGame() { 
            if(wordData.length === 0) { alert("此課程沒有第一關資料！"); return; }
            gameWords = shuffle([...wordData]); currentIdx = 0; initGame(); 
        }

        function initGame() {
            const pool = document.getElementById('pool'), targetWord = document.getElementById('target-word'), msg = document.getElementById('message'), guide = document.getElementById('zone-guide'), nextBtn = document.getElementById('next-btn');
            document.querySelectorAll('.part-img').forEach(img => img.remove());
            msg.innerText = ''; nextBtn.style.display = 'none'; nextBtn.innerText = '我拼好了 ➡️'; nextBtn.onclick = nextWord;
            placedCount = 0; guide.style.display = 'block';
            let data = gameWords[currentIdx]; targetWord.innerText = data.word;
            let shuffledParts = [...data.parts].sort(() => Math.random() - 0.5);
            
            shuffledParts.forEach((src) => {
                let img = document.createElement('img'); img.src = src; img.className = 'part-img'; 
                img.draggable = false;
                
                let partIdx = data.parts.indexOf(src);
                // 根據放大後的 BASE_PART_SIZE 計算比例
                if (data.pos[partIdx] && data.pos[partIdx].scale) {
                    let newSize = BASE_PART_SIZE * data.pos[partIdx].scale;
                    img.style.width = newSize + 'px';
                    img.style.height = newSize + 'px';
                }

                img.addEventListener('pointerdown', handlePointerDown);
                img.onerror = function() { console.error("圖片遺失: " + src); }; 
                pool.appendChild(img);
            });
        }

        function handlePointerDown(e) {
            e.preventDefault();
            activePart = this;
            activePart.style.zIndex = 1000;
            activePart.setPointerCapture(e.pointerId);

            let rect = activePart.getBoundingClientRect();
            
            if (activePart.parentElement.id === 'pool') {
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                activePart.style.position = 'fixed';
                activePart.style.left = rect.left + 'px';
                activePart.style.top = rect.top + 'px';
                document.body.appendChild(activePart);
            } else if (activePart.parentElement.id === 'zone') {
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
            }

            activePart.addEventListener('pointermove', handlePointerMove);
            activePart.addEventListener('pointerup', handlePointerUp);
        }

        function handlePointerMove(e) {
            if (!activePart) return;
            e.preventDefault();
            
            if (activePart.parentElement === document.body) {
                activePart.style.left = (e.clientX - offsetX) + 'px';
                activePart.style.top = (e.clientY - offsetY) + 'px';
            } else if (activePart.parentElement.id === 'zone') {
                let zoneRect = document.getElementById('zone').getBoundingClientRect();
                let newLeft = e.clientX - zoneRect.left - offsetX;
                let newTop = e.clientY - zoneRect.top - offsetY;
                activePart.style.left = newLeft + 'px';
                activePart.style.top = newTop + 'px';
            }
        }

        function handlePointerUp(e) {
            if (!activePart) return;
            activePart.releasePointerCapture(e.pointerId);
            activePart.removeEventListener('pointermove', handlePointerMove);
            activePart.removeEventListener('pointerup', handlePointerUp);
            activePart.style.zIndex = 10;

            let zone = document.getElementById('zone');
            let zoneRect = zone.getBoundingClientRect();
            let pool = document.getElementById('pool');

            let droppedInZone = ( e.clientX >= zoneRect.left && e.clientX <= zoneRect.right && e.clientY >= zoneRect.top && e.clientY <= zoneRect.bottom );

            if (droppedInZone) {
                if (activePart.parentElement === document.body) {
                    zone.appendChild(activePart);
                    document.getElementById('zone-guide').style.display = 'none';
                    placedCount++;
                }
                activePart.style.position = 'absolute';
                let newLeft = e.clientX - zoneRect.left - offsetX;
                let newTop = e.clientY - zoneRect.top - offsetY;
                activePart.style.left = newLeft + 'px';
                activePart.style.top = newTop + 'px';
                
                checkWin();
            } else {
                if (activePart.parentElement === zone) placedCount--;
                pool.appendChild(activePart);
                activePart.style.position = 'relative';
                activePart.style.left = 'auto';
                activePart.style.top = 'auto';
                
                if (placedCount < gameWords[currentIdx].parts.length) { 
                    document.getElementById('message').innerText = ''; 
                    document.getElementById('next-btn').style.display = 'none'; 
                }
                if (document.querySelectorAll('#zone .part-img').length === 0) {
                    document.getElementById('zone-guide').style.display = 'block';
                }
            }
            activePart = null;
        }
        
        function checkWin() { if (placedCount === gameWords[currentIdx].parts.length) { document.getElementById('message').innerText = "🌟 請檢查拼得對不對喔！ 🌟"; document.getElementById('next-btn').style.display = 'inline-block'; } }
        
        function nextWord() { 
            currentIdx++; 
            if (currentIdx < gameWords.length) { 
                initGame(); 
            } else { 
                document.getElementById('message').style.color = "#4CAF50";
                document.getElementById('message').innerText = "🎉 恭喜！本關卡挑戰成功！"; 
                let btn = document.getElementById('next-btn');
                btn.innerText = '🔙 回課程選單';
                btn.onclick = () => { window.location.href = `lesson.html?id=${lessonId}`; };
            } 
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
