<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程關卡選擇</title>
    <script src="data.js"></script>
    <style>
        /* 恢復外層的淺灰藍色，作為大螢幕的邊界緩衝 */
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #eef2f5; 
            margin: 0; 
            padding: 2vh 2vw; /* 讓四周保留一點點好看的邊距 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        /* 巨無霸遊戲底板：佔據 95% 以上畫面，取代原本的 canvas-16-9 */
        .main-container { 
            position: relative; 
            width: 100%; 
            max-width: 1600px; /* 放到超大 */
            min-height: 92vh; /* 高度幾乎撐滿 */
            background-color: #fdf5e6; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 4%; 
            box-sizing: border-box; 
        }

        /* 左上角返回按鈕放大 */
        .back-btn { 
            position: absolute; 
            top: 40px; 
            left: 40px; 
            background-color: #fff; 
            color: #5a4a42; 
            text-decoration: none; 
            font-size: clamp(18px, 1.8vw, 26px); 
            font-weight: bold; 
            padding: 15px 30px; 
            border-radius: 50px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); 
            transition: 0.2s; 
            border: 3px solid #e0e0e0;
            z-index: 10;
        }
        .back-btn:hover { background-color: #f8f9fa; transform: scale(1.05); border-color: #bdc3c7;}

        .header-area { 
            text-align: center; 
            margin-top: 20px;
            margin-bottom: 50px; 
            width: 100%;
        }
        
        h1 { 
            color: #5a4a42; 
            font-size: clamp(36px, 4.5vw, 70px); 
            margin: 0 0 15px 0; 
            text-shadow: 2px 3px 5px rgba(0,0,0,0.15); 
        }
        .subtitle { 
            font-size: clamp(22px, 2.5vw, 36px); 
            color: #7b6855; 
            margin: 0; 
            font-weight: bold;
        }
        
        /* 升級為 Grid 網格，讓四個按鈕均分空間且自動換行 */
        .level-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 40px; /* 按鈕之間的間距拉大 */
            width: 100%; 
            max-width: 1400px;
            flex-grow: 1; /* 讓按鈕區塊自動填滿剩下的高度 */
            align-content: center; /* 垂直置中 */
        }
        
        /* 卡片大幅度放大，增加點擊熱區 */
        .level-card { 
            background-color: #ffffff; 
            border-radius: 30px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.3s ease; 
            border: 8px solid transparent; /* 邊框加粗 */
            cursor: pointer; 
            padding: 50px 20px; 
            text-align: center; 
            min-height: 350px; /* 卡片長高 */
        }
        
        .level-card:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
        }
        
        .level-icon { font-size: clamp(70px, 7vw, 120px); margin-bottom: 25px; }
        .level-title { font-size: clamp(28px, 2.5vw, 40px); font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .level-desc { font-size: clamp(18px, 1.5vw, 24px); color: #666; font-weight: bold; }
        
        /* 顏色區分保持不變 */
        .card-1 { border-color: #ff9999; } .card-1 .level-title { color: #e74c3c; }
        .card-2 { border-color: #87cefa; } .card-2 .level-title { color: #3498db; }
        .card-3 { border-color: #98fb98; } .card-3 .level-title { color: #2ecc71; }
        .card-4 { border-color: #ffd700; } .card-4 .level-title { color: #f39c12; }

        @media (max-width: 768px) {
            .back-btn { position: relative; top: 0; left: 0; margin-bottom: 20px; display: inline-block;}
            .header-area { margin-top: 10px; margin-bottom: 30px; }
            .level-card { min-height: 250px; padding: 30px 15px;}
        }
    </style>
</head>
<body>
    <div class="main-container">
        <a href="index.html" class="back-btn">🏠 回到總首頁</a>

        <div class="header-area">
            <h1 id="lesson-title-display">載入中...</h1>
            <p class="subtitle">準備好挑戰四個關卡了嗎？</p>
        </div>
        
        <div class="level-container">
            <a href="#" id="link-lvl1" class="level-card card-1">
                <div class="level-icon">🧩</div>
                <div class="level-title">第一關<br>部件拼拼樂</div>
                <div class="level-desc">把零件組合成字！</div>
            </a>
            <a href="#" id="link-lvl2" class="level-card card-2">
                <div class="level-icon">👀</div>
                <div class="level-title">第二關<br>語詞翻翻樂</div>
                <div class="level-desc">選出正確的字！</div>
            </a>
            <a href="#" id="link-lvl3" class="level-card card-3">
                <div class="level-icon">🕵️‍♂️</div>
                <div class="level-title">第三關<br>生字大富翁</div>
                <div class="level-desc">找出正確答案！</div>
            </a>
            <a href="#" id="link-lvl4" class="level-card card-4">
                <div class="level-icon">🚂</div>
                <div class="level-title">第四關<br>語詞配對</div>
                <div class="level-desc">找出正確答案！</div>
            </a>
        </div>
    </div>

    <script>
        window.onload = function() {
            // 1. 取得網址列的 id (例如 ?id=2)
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('id');

            // 如果找不到這個課程，退回首頁
            if (!lessonId || !allLessonsData[lessonId]) {
                alert("找不到課程資料！即將返回首頁。");
                window.location.href = "index.html";
                return;
            }

            // 2. 把大標題換成這課的名稱
            const lessonInfo = allLessonsData[lessonId];
            document.getElementById('lesson-title-display').innerText = lessonInfo.title;

            // 3. 把四個關卡的網址都加上 ?id=X 傳遞下去
            document.getElementById('link-lvl1').href = `level1.html?id=${lessonId}`;
            document.getElementById('link-lvl2').href = `level2.html?id=${lessonId}`;
            document.getElementById('link-lvl3').href = `level3.html?id=${lessonId}`;
            document.getElementById('link-lvl4').href = `level4.html?id=${lessonId}`;
        };
    </script>
</body>
</html>
