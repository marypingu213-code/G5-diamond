<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иӘІзЁӢйҒёе–®</title>
    <script src="data.js"></script>
    <style>
        /* и®“ body зӣҙжҺҘеҘ—з”ЁиғҢжҷҜпјҢжӢҝжҺүйӮҠи·қ */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #fdf5e6; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
        }
        
        /* еҫ№еә• 100% ж»ҝзүҲ */
        .main-container { 
            position: relative; 
            width: 100%; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 4%; 
            box-sizing: border-box; 
        }

        .header-area { 
            text-align: center; 
            margin-bottom: 50px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        .back-btn { 
            position: absolute; 
            left: 20px; 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            font-size: clamp(18px, 1.8vw, 26px); 
            padding: 15px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .back-btn:hover { background-color: #2980b9; transform: scale(1.05); }

        h1 { color: #5a4a42; font-size: clamp(36px, 4vw, 65px); margin: 0; }

        .cards-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 40px; 
            width: 100%; 
            max-width: 1600px;
            flex-grow: 1; 
            align-content: center; 
        }

        .level-card { 
            background: white; 
            border-radius: 25px; 
            border: 6px solid transparent; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 50px 20px; 
            text-decoration: none; 
            transition: 0.3s; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            min-height: 280px; 
        }

        .level-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }

        .icon { font-size: clamp(70px, 7vw, 120px); margin-bottom: 25px; }
        .level-num { font-size: clamp(22px, 1.8vw, 30px); font-weight: bold; margin-bottom: 12px; }
        .level-name { font-size: clamp(28px, 2.5vw, 40px); font-weight: bold; }

        #btn-l1 { border-color: #ff9ff3; color: #f368e0; }
        #btn-l2 { border-color: #feca57; color: #ff9f43; }
        #btn-l3 { border-color: #1dd1a1; color: #10ac84; }
        #btn-l4 { border-color: #48dbfb; color: #0abde3; }

        @media (max-width: 768px) {
            .header-area { flex-direction: column; gap: 20px; margin-bottom: 30px; }
            .back-btn { position: relative; left: 0; }
        }
    </style>
</head>
<body>
    <div class="main-container">

        </div>
        <div class="cards-container">

                <div class="icon">рҹ§©</div><div class="level-num">з¬¬дёҖй—ң</div><div class="level-name">йғЁд»¶жӢјжӢјжЁӮ</div>
            </a>
            <a href="#" id="btn-l2" class="level-card">
                <div class="icon">рҹғҸ</div><div class="level-num">з¬¬дәҢй—ң</div><div class="level-name">еӯ—зө„иӘһи©һ</div>
            </a>
            <a href="#" id="btn-l3" class="level-card">
                <div class="icon">рҹ•өпёҸвҖҚвҷӮпёҸ</div><div class="level-num">з¬¬дёүй—ң</div><div class="level-name">иӘһи©һжҲ‘жңҖиЎҢ</div>
            </a>

            </a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1";
        if (allLessonsData[lessonId]) {

        }
        document.getElementById('btn-l1').href = `level1.html?id=${lessonId}`;
        document.getElementById('btn-l2').href = `level2.html?id=${lessonId}`;

        document.getElementById('btn-l4').href = `level4.html?id=${lessonId}`;
    </script>
</body>
</html>
