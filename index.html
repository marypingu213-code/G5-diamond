<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網 - 總大廳</title>
    <script src="data.js"></script>
    <style>
        /* 外層深灰色背景 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #ecf0f1; 
            margin: 0; padding: 2vh 2vw; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; box-sizing: border-box; overflow: hidden;
        }

        /* 內層溫暖的奶油色大看板 */
        .main-container {
            width: 100%; height: 96vh; max-width: 1400px;
            background-color: #fff9e6; 
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 3vh 3vw; box-sizing: border-box; position: relative;
        }

        .header-area { text-align: center; margin-bottom: 3vh; flex-shrink: 0; }
        h1 { color: #5a4a42; font-size: clamp(36px, 5vh, 60px); margin: 0 0 1vh 0; letter-spacing: 2px;}
        .subtitle { font-size: clamp(18px, 2.5vh, 24px); color: #8d6e63; margin: 0; }

        /* 讓 12 課自動排好排滿的網格 */
        .lesson-list { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr);
            gap: 2vh 2vw; width: 100%; max-width: 1200px;
            min-height: 0; flex-grow: 1; margin-bottom: 1vh; box-sizing: border-box; 
        }

        /* 課文按鈕設計 */
        .lesson-card { 
            background-color: #ffffff; border-radius: 20px; text-decoration: none; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.2s; border: 5px solid #3498db; padding: 1vh 2vw; text-align: center; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); color: #333;
            font-size: clamp(20px, 3vh, 32px); font-weight: bold; line-height: 1.4;
            height: 100%; width: 100%; box-sizing: border-box;
        }

        /* 點擊時的按壓效果 */
        .lesson-card:active { transform: scale(0.95); box-shadow: none; background-color: #e3f2fd;}

        /* 給不同課文不同顏色的邊框 */
        .lesson-card:nth-child(4n+1) { border-color: #e74c3c; } 
        .lesson-card:nth-child(4n+2) { border-color: #f39c12; } 
        .lesson-card:nth-child(4n+3) { border-color: #2ecc71; } 
        .lesson-card:nth-child(4n+4) { border-color: #3498db; } 

    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-area">
            <h1>🏫 特教國語遊戲網 🎪</h1>
            <p class="subtitle">請選擇今天要挑戰的課程！</p>
        </div>
        
        <div class="lesson-list" id="lesson-container"></div>
    </div>

    <script>
        window.onload = function() {
            const container = document.getElementById('lesson-container');
            
            // 檢查有沒有成功讀取到 data.js
            if (typeof allLessonsData !== 'undefined') {
                
                // 開始把 12 課一課一課抓出來做成按鈕
                for (let lessonId in allLessonsData) {
                    const lessonInfo = allLessonsData[lessonId];
                    const card = document.createElement('a');
                    
                    // 🌟🌟🌟 關鍵就在這裡！🌟🌟🌟
                    // 當我們點擊這個按鈕時，它會前往 lesson.html，並且在網址後面加上 "?id=第幾課"
                    card.href = `lesson.html?id=${lessonId}`; 
                    
                    card.className = 'lesson-card';
                    card.innerText = lessonInfo.title;
                    
                    container.appendChild(card);
                }
            } else {
                container.innerHTML = '<h2 style="color:red; text-align:center; grid-column: 1/-1;">找不到資料庫 (data.js) 喔！請確認檔案有上傳。</h2>';
            }
        };
    </script>
</body>
</html>
