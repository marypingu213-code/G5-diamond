<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網</title>
    <script src="data.js"></script>
    <style>
        /* 滿版背景與邊距緩衝 */
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #eef2f5; 
            margin: 0; 
            padding: 2vh 2vw; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        /* 巨無霸遊戲底板：佔滿 95% 螢幕 */
        .main-container { 
            position: relative; 
            width: 100%; 
            max-width: 1600px; 
            min-height: 92vh; 
            background-color: #fdf5e6; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 3%; 
            box-sizing: border-box; 
        }

        .header-area { 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            color: #5a4a42; 
            font-size: clamp(40px, 5vw, 80px); 
            margin: 0 0 15px 0; 
            text-shadow: 2px 3px 5px rgba(0,0,0,0.15); 
        }
        
        .subtitle { 
            font-size: clamp(22px, 2.5vw, 36px); 
            color: #7b6855; 
            margin: 0; 
            font-weight: bold;
        }

        /* QR Code 放大並固定右上角 */
        .qr-box { 
            position: absolute; 
            top: 40px; 
            right: 50px; 
            background: #fff; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            border: 4px dashed #f39c12; 
            transition: transform 0.3s; 
            z-index: 100; 
        }
        .qr-box:hover { transform: scale(1.05); }
        .qr-box p { margin: 0 0 10px 0; font-size: 18px; font-weight: bold; color: #e74c3c; letter-spacing: 1px; }
        .qr-box img { width: 140px; height: 140px; object-fit: contain; }

        /* 外部連結工具按鈕放大 */
        .tool-btn { 
            background-color: #8d6e63; 
            color: white; 
            text-decoration: none; 
            font-size: clamp(18px, 1.8vw, 26px); 
            font-weight: bold; 
            padding: 15px 30px; 
            border-radius: 50px; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 6px 10px rgba(0,0,0,0.15); 
            transition: 0.2s; 
            margin-top: 15px; 
            border: 3px solid #6d4c41; 
        }
        .tool-btn:hover { transform: scale(1.05) translateY(-3px); background-color: #795548; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* 課程列表區：改為 Grid 自動延伸網格 */
        .lesson-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 35px; 
            width: 100%; 
            max-width: 1500px; 
            padding: 10px 30px; 
            box-sizing: border-box; 
            flex-grow: 1;
            align-content: start;
        }

        .lesson-card { 
            background-color: #ffffff; 
            border-radius: 25px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.08); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s; 
            border: 5px solid #3498db; 
            cursor: pointer; 
            padding: 20px; 
            min-height: 150px; 
            box-sizing: border-box; 
        }

        .lesson-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
            background-color: #eafaf1; 
            border-color: #2ecc71; 
        }

        .lesson-title { 
            font-size: clamp(26px, 2.2vw, 36px); 
            font-weight: bold; 
            color: #2c3e50; 
            text-align: center;
            line-height: 1.5;
        }

        @media (max-width: 768px) { 
            .qr-box { display: none; }
            .header-area { margin-top: 10px; margin-bottom: 30px;}
            .main-container { padding: 30px 4%; }
            .lesson-card { min-height: 120px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <div class="qr-box" title="讓學生用平板掃描這裡">
            <p>📱 掃描進遊戲</p>
            <img id="qr-code-image" src="" alt="自動產生 QR Code">
        </div>

        <div class="header-area">
            <h1>🏫 特教國語遊戲網 🎪</h1>
            <p class="subtitle">請選擇今天要挑戰的課程！</p>
            
            <a href="https://gsyan888.blogspot.com/p/stroke.html#" target="_blank" class="tool-btn">
                🐻 熊熊筆順練習網
            </a>
        </div>
        
        <div class="lesson-list" id="lesson-container"></div>
    </div>

    <script>
        window.onload = function() {
            let cleanUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('qr-code-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(cleanUrl);

            const container = document.getElementById('lesson-container');
            if (typeof allLessonsData !== 'undefined') {
                for (let lessonId in allLessonsData) {
                    const lessonInfo = allLessonsData[lessonId];
                    const card = document.createElement('a');
                    card.href = `lesson.html?id=${lessonId}`; 
                    card.className = 'lesson-card';
                    
                    const title = document.createElement('div');
                    title.className = 'lesson-title';
                    title.innerText = lessonInfo.title; 
                    
                    card.appendChild(title);
                    container.appendChild(card);
                }
            }
        };
    </script>
</body>
</html>
