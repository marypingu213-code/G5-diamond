<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網</title>
    <script src="data.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; background-color: #eef2f5; margin: 0; padding: 1vh 1vw; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        
        /* 調整寬度為 98% 以充滿整個版面 */
        .main-container { 
            position: relative; 
            width: 98vw; 
            max-width: 1800px; 
            min-height: 96vh; 
            background-color: #fdf5e6; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 2%; 
            box-sizing: border-box; 
        }

        .header-area { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #5a4a42; font-size: clamp(36px, 4vw, 60px); margin: 0 0 10px 0; text-shadow: 2px 3px 5px rgba(0,0,0,0.15); }
        .subtitle { font-size: clamp(20px, 2vw, 30px); color: #7b6855; margin: 0; font-weight: bold; }

        .qr-box { position: absolute; top: 30px; right: 30px; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); text-align: center; border: 4px dashed #f39c12; z-index: 100; }
        .qr-box img { width: 120px; height: 120px; object-fit: contain; }

        .tool-btn { background-color: #8d6e63; color: white; text-decoration: none; font-size: 20px; font-weight: bold; padding: 12px 25px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; margin-top: 10px; border: 3px solid #6d4c41; transition: 0.2s; }
        .tool-btn:hover { transform: scale(1.05); background-color: #795548; }

        /* 設定為 3 欄網格 */
        .lesson-list { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            width: 100%; 
            flex-grow: 1;
            align-content: start;
        }

        .lesson-card { 
            background-color: #ffffff; 
            border-radius: 25px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.08); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s; 
            border: 5px solid #3498db; 
            padding: 25px; 
            min-height: 180px; 
            box-sizing: border-box; 
        }
        .lesson-card:hover { transform: translateY(-8px); background-color: #eafaf1; border-color: #2ecc71; }
        .lesson-title { font-size: clamp(24px, 2vw, 32px); font-weight: bold; color: #2c3e50; text-align: center; line-height: 1.4; margin-bottom: 15px; }

        .level-container { display: flex; gap: 12px; }
        .btn-l { 
            padding: 10px 18px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 24px; /* 加大 emoji 大小 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            transition: 0.2s;
        }
        .btn-l:hover { transform: scale(1.1); }
        .btn-unlocked { background-color: #27ae60; color: white; }
        .btn-locked { background-color: #95a5a6; color: #ecf0f1; cursor: not-allowed; font-size: 20px; }

        /* 平板或手機模式自動切換欄數 */
        @media (max-width: 1200px) { .lesson-list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            .lesson-list { grid-template-columns: 1fr; }
            .qr-box { display: none; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="qr-box">
            <p style="margin:0 0 5px 0; font-weight:bold;">📱 掃描進遊戲</p>
            <img id="qr-code-image" src="" alt="QR Code">
        </div>

        <div class="header-area">
            <h1>🏫 特教國語遊戲網 🎪</h1>
            <p class="subtitle">請選擇今天要挑戰的課程！</p>
            <a href="https://gsyan888.blogspot.com/p/stroke.html#" target="_blank" class="tool-btn">🐻 熊熊筆順練習網</a>
        </div>
        
        <div class="lesson-list" id="lesson-container"></div>
    </div>

    <script>
        function enterLevel(lessonId, levelNum) {
            if (levelNum === 4) {
                const isUnlocked = localStorage.getItem(`level4_unlocked_lesson_${lessonId}`);
                if (isUnlocked !== 'true') {
                    alert("🔒 這一關還沒解鎖喔！請先完成「第三關：語詞填空」。");
                    return;
                }
            }
            window.location.href = `level${levelNum}.html?lesson=${lessonId}`;
        }

        window.onload = function() {
            let cleanUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('qr-code-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(cleanUrl);

            const container = document.getElementById('lesson-container');
            if (typeof allLessonsData !== 'undefined') {
                for (let lessonId in allLessonsData) {
                    const lessonInfo = allLessonsData[lessonId];
                    const card = document.createElement('div');
                    card.className = 'lesson-card';
                    
                    const title = document.createElement('div');
                    title.className = 'lesson-title';
                    title.innerText = lessonInfo.title;
                    card.appendChild(title);

                    const lvlWrapper = document.createElement('div');
                    lvlWrapper.className = 'level-container';

                    [1, 2, 3, 4].forEach(num => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-l';
                        
                        // 設定顯示內容：1-3 顯示鑽石，4 顯示 L4
                        if (num <= 3) {
                            btn.innerText = "💎";
                        } else {
                            btn.innerText = "L4";
                        }
                        
                        // 鎖定邏輯處理
                        if (num === 4) {
                            const isLocked = localStorage.getItem(`level4_unlocked_lesson_${lessonId}`) !== 'true';
                            if (isLocked) {
                                btn.classList.add('btn-locked');
                                btn.innerText = "L4 🔒";
                            } else {
                                btn.classList.add('btn-unlocked');
                            }
                        } else {
                            btn.classList.add('btn-unlocked');
                        }

                        btn.onclick = (e) => {
                            e.stopPropagation();
                            enterLevel(lessonId, num);
                        };
                        lvlWrapper.appendChild(btn);
                    });

                    card.appendChild(lvlWrapper);
                    container.appendChild(card);
                }
            }
        };
    </script>
</body>
</html>
