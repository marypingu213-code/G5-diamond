<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲網</title>
    <script src="data.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; background-color: #eef2f5; margin: 0; padding: 1vh 1vw; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        
        .main-container { 
            position: relative; 
            width: 98vw; 
            max-width: 1800px; 
            min-height: 96vh; 
            background-color: #fdf5e6; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 2%; 
            box-sizing: border-box; 
        }

        .header-area { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        h1 { color: #5a4a42; font-size: clamp(36px, 4vw, 60px); margin: 0 0 10px 0; text-shadow: 2px 3px 5px rgba(0,0,0,0.15); }
        .subtitle { font-size: clamp(20px, 2vw, 30px); color: #7b6855; margin: 0; font-weight: bold; }

        .qr-box { position: absolute; top: 30px; right: 30px; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); text-align: center; border: 4px dashed #f39c12; z-index: 100; }
        .qr-box img { width: 120px; height: 120px; object-fit: contain; }

        .tool-btn { color: white; text-decoration: none; font-size: 20px; font-weight: bold; padding: 12px 25px; border-radius: 50px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; border: 3px solid; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tool-btn:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }

        .lesson-list { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            width: 100%; 
            flex-grow: 1;
            align-content: start;
        }

        .lesson-card { 
            background-color: #ffffff; 
            border-radius: 25px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.08); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s; 
            border: 5px solid #3498db; 
            padding: 25px; 
            min-height: 180px; 
            box-sizing: border-box; 
        }
        .lesson-card:hover { transform: translateY(-8px); background-color: #eafaf1; border-color: #2ecc71; box-shadow: 0 15px 25px rgba(0,0,0,0.1); }
        .lesson-title { font-size: clamp(24px, 2vw, 32px); font-weight: bold; color: #2c3e50; text-align: center; line-height: 1.4; margin-bottom: 15px; }

        .level-container { display: flex; gap: 12px; }
        .btn-l { 
            padding: 10px 18px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 24px; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            transition: 0.2s;
        }
        .btn-l:hover { transform: scale(1.1); }
        
        .btn-green { background-color: #27ae60; color: white; }
        .btn-blue { background-color: #3498db; color: white; }
        .btn-locked { background-color: #95a5a6; color: #ecf0f1; cursor: not-allowed; font-size: 20px; }

        @media (max-width: 1200px) { .lesson-list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .lesson-list { grid-template-columns: 1fr; } .qr-box { display: none; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="qr-box">
            <p style="margin:0 0 5px 0; font-weight:bold;">📱 掃描進遊戲</p>
            <img id="qr-code-image" src="" alt="QR Code">
        </div>

    <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
        <a href="https://gsyan888.blogspot.com/p/stroke.html#" target="_blank" class="tool-btn" style="background-color: #8d6e63; border-color: #6d4c41;">
            🐻 熊熊筆順練習網
        </a>
        <a href="https://marypingu213-code.github.io/G5-vacab/" target="_blank" class="tool-btn" style="background-color: #e74c3c; border-color: #c0392b;">
            🎰 語詞搶答拉霸機
        </a>
        <!-- 以下是新增的第三個按鈕 -->
        <a href="https://marypingu213-code.github.io/G5-argumentative-essay/" target="_blank" class="tool-btn" style="background-color: #3498db; border-color: #2980b9; color: white;">
            🏆 小小辯論家
        </a>
    </div>
        </div>
        
        <div class="lesson-list" id="lesson-container"></div>
    </div>

    <script>
        function enterLevel(lessonId, levelNum) {
            if (levelNum === 4) {
                const isUnlocked = localStorage.getItem(`level4_unlocked_lesson_${lessonId}`);
                if (isUnlocked !== 'true') {
                    alert("🔒 這一關還沒解鎖喔！請先完成「第三關：語詞填空」。");
                    return;
                }
            }
            window.location.href = `level${levelNum}.html?lesson=${lessonId}`;
        }

        window.onload = function() {
            let cleanUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('qr-code-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(cleanUrl);

            const container = document.getElementById('lesson-container');
            
            // 檢查 data.js 有沒有成功被讀取進來
            if (typeof allLessonsData !== 'undefined') {
                for (let lessonId in allLessonsData) {
                    const lessonInfo = allLessonsData[lessonId];
                    const card = document.createElement('div');
                    card.className = 'lesson-card';
                    
                    const title = document.createElement('div');
                    title.className = 'lesson-title';
                    title.innerText = lessonInfo.title;
                    card.appendChild(title);

                    const lvlWrapper = document.createElement('div');
                    lvlWrapper.className = 'level-container';

                    const isUnlocked = localStorage.getItem(`level4_unlocked_lesson_${lessonId}`) === 'true';

                    [1, 2, 3, 4].forEach(num => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-l';
                        btn.innerText = "💎"; 

                        if (num === 4) {
                            if (isUnlocked) {
                                btn.classList.add('btn-blue');
                            } else {
                                btn.classList.add('btn-locked');
                                btn.innerText = "💎 🔒"; 
                            }
                        } else if (num === 3 && isUnlocked) {
                            btn.classList.add('btn-blue');
                        } else {
                            btn.classList.add('btn-green');
                        }

                        btn.onclick = (e) => {
                            e.stopPropagation();
                            enterLevel(lessonId, num);
                        };
                        lvlWrapper.appendChild(btn);
                    });

                    card.appendChild(lvlWrapper);
                    container.appendChild(card);
                }
            } else {
                // 如果找不到 data.js，顯示錯誤提示，讓您一眼就能發現問題
                container.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center; color: #e74c3c;">找不到資料庫 (data.js) 喔！請確認檔案有上傳在同一個資料夾。</h2>';
            }
        };
    </script>
</body>
</html>
