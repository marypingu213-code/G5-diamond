<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教國語遊戲：Level 4 語詞挑戰</title>
    <style>
        :root { --primary-bg: #2c3e50; --container-bg: #34495e; --word-bg: #3498db; --drop-bg: rgba(255, 255, 255, 0.1); --correct-color: #2ecc71; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--primary-bg); color: white; text-align: center; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .game-container { background-color: var(--container-bg); padding: 40px; border-radius: 30px; width: 95%; max-width: 1200px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); border: 4px solid #455a64; position: relative; }
        h2 { font-size: 42px; color: #3498db; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-top: 0; }
        .word-bank { background: #1a252f; padding: 25px; border-radius: 20px; margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; border: 4px dashed #3498db; min-height: 100px; }
        .word-item { background: var(--word-bg); color: white; padding: 15px 30px; border-radius: 15px; font-weight: 900; font-size: 32px; cursor: grab; user-select: none; box-shadow: 0 6px 0 #2980b9; transition: 0.2s; }
        .word-item:active { cursor: grabbing; transform: translateY(4px); box-shadow: 0 2px 0 #2980b9; }
        .quiz-area { text-align: left; background: rgba(0,0,0,0.1); padding: 30px; border-radius: 20px; }
        .question { font-size: 32px; margin: 25px 0; line-height: 1.8; display: flex; align-items: center; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .drop-zone { min-width: 160px; height: 60px; border: 3px dashed #3498db; margin: 5px 15px; display: inline-flex; align-items: center; justify-content: center; background: var(--drop-bg); border-radius: 12px; transition: 0.3s; font-size: 32px; color: #3498db; font-weight: bold; }
        .drop-zone.over { background: rgba(52, 152, 219, 0.4); transform: scale(1.1); }
        .drop-zone.filled { background: #ffffff; color: #2c3e50; border: none; border-bottom: 6px solid #bdc3c7; }
        .check-btn { background-color: var(--correct-color); color: white; border: none; padding: 20px 60px; font-size: 36px; border-radius: 60px; cursor: pointer; margin-top: 40px; font-weight: 900; box-shadow: 0 8px 0 #27ae60; }
        #lock-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 30px; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="lock-screen">
        <h1>🔒 尚未解鎖</h1>
        <p style="font-size: 24px;">請先完成這一課的 Level 3 挑戰喔！</p>
        <button onclick="location.href='index.html'" style="padding: 15px 30px; font-size: 20px; cursor: pointer;">回首頁</button>
    </div>

    <h2 id="lesson-title">🚀 載入中... 🚀</h2>
    <div class="word-bank" id="wordBank"></div>
    <div class="quiz-area" id="quizArea"></div>
    <button class="check-btn" onclick="checkAll()">完成挑戰！</button>
</div>

<script>
    const lessonData = {

            questions: [
                "夏天運動完，喝一杯冰涼的 @ 最消暑了。",
                "這間餐廳佈置得很精緻，用餐的 @ 非常好。",
                "睡覺前，我會將故事書 @ ，放在床頭櫃上。",
                "買衣服前，要先看清楚 @ 上的洗滌說明。",
                "把方糖放入熱水中攪拌，很快就會 @ 不見了。",
                "爸爸每天早晨都習慣喝一杯黑 @ 來提神。",
                "弟弟運氣很好，在尾牙活動中抽中了一張 @ 。",
                "這位小朋友的笑容非常 @ 可愛。"
            ]
        },
        "2": {
            title: "第二課：語詞挑戰 (後半)",
            words: ["遭受", "盆栽", "階梯", "鑽石", "轟炸", "隆重", "前途", "圖鑑", "繽紛"],
            questions: [
                "這次強大的地震，讓許多老舊房屋 @ 了嚴重的損毀。",
                "奶奶在頂樓種了許多花草 @ ，布置得很美。",
                "小朋友們排好隊，手扶著扶手，慢慢走下這段 @ 。",
                "這條項鍊上面鑲了一顆 @ ，在陽光下非常奪目。",
                "電影中的飛機正在對地面的目標進行模擬 @ 。",
                "學校今天舉辦了 @ 的畢業典禮，場面溫馨感人。",
                "只要不斷學習，每個人都能擁有光明的 @ 。",
                "弟弟喜歡閱讀恐龍 @ ，能清楚說出每一種名字。",
                "春天的花園裡，到處都能看到五彩 @ 的花朵。"
            ]
        },
        "3": {
            title: "第三課：語詞挑戰 (後半)",
            words: ["闖禍", "嚴格", "車庫", "苦澀", "剩餘", "瞥見", "狂風", "口罩", "道歉"],
            questions: [
                "小明不小心踢破了鄰居家的玻璃，知道自己這下子 @ 了。",
                "教練雖然教學很 @ ，但他其實是為了大家安全著想。",
                "爸爸把家裡的休旅車緩緩開進 @ 停放。",
                "這杯涼茶喝起來味道有點 @ ，但對身體很好。",
                "把晚餐 @ 的飯菜妥善冷藏，明天還可以繼續吃。",
                "剛剛過馬路時，我好像 @ 老師也在附近的超市。",
                "颱風來襲，窗外 @ 大作，發出呼呼的聲音。",
                "進出醫院或公共場所時，記得要把 @ 戴好。",
                "做錯事就要勇於承擔，並且誠心地向對方 @ 。"
            ]
        },
        "4": {
            title: "第四課：語詞挑戰 (後半)",
            words: ["嫌疑", "疑問", "押金", "審判", "處罰", "沾到", "貪心", "饒命", "計謀"],
            questions: [
                "那名男子因為行跡可疑，被列為案件的 @ 人。",
                "對於老師剛才解釋的題目，我心裡還有一些 @ 。",
                "租借公共自行車時，通常需要先支付一筆 @ 。",
                "正義的法官在法庭上進行公正的 @ 。",
                "犯了校規就必須接受適當的 @ ，以後才不會再犯。",
                "吃午餐時要小心，衣服別 @ 菜湯了。",
                "做人要知足，不可以太過 @ ，什麼都想要。",
                "壞狼被打敗後，不停地向小羊喊著「 @ 」。",
                "諸葛亮利用聰明的 @ ，成功擊退了敵軍。"
            ]
        },
        "5": {
            title: "第五課：語詞挑戰 (後半)",
            words: ["沙啞", "增加", "闖禍", "逞強", "舌頭", "鋒利", "假若", "距離", "倘若"],
            questions: [
                "因為感冒喉嚨發炎，小明說話的聲音變得很 @ 。",
                "為了應付比賽，爸爸決定 @ 每天運動的時間。",
                "弟弟在客廳亂踢球打破花瓶，又 @ 了。",
                "明明體力不支卻還要 @ 跑完長跑，容易受傷。",
                "醫生提醒我們，觀察 @ 的顏色可以知道健康狀況。",
                "這把剪刀非常 @ ，使用時要特別小心。",
                " @ 明天下雨，我們原定的野餐活動就必須取消。",
                "保持適當的行車 @ ，是安全最重要的一環。",
                " @ 你有困難，一定要告訴老師或家長。"
            ]
        },
        "6": {
            title: "第六課：語詞挑戰 (後半)",
            words: ["沙啞", "增加", "闖禍", "逞強", "舌頭", "鋒利", "假若", "距離", "倘若"],
            questions: [
                "因為感冒喉嚨發炎，小明說話的聲音變得很 @ 。",
                "為了應付路跑比賽，爸爸決定 @ 每天運動時間。",
                "弟弟在客廳亂踢球打破花瓶，又 @ 了。",
                "明明體力不支卻還要 @ 跑完長跑，容易受傷。",
                "醫生提醒我們，觀察 @ 的顏色可以知道健康狀況。",
                "這把剪刀非常 @ ，使用時要特別小心。",
                " @ 明天下雨，我們原定的野餐活動就必須取消。",
                "保持適當的行車 @ ，是行車安全最重要的一環。",
                " @ 你有困難，一定要告訴老師或家長。"
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lesson') || "1";
    const currentData = lessonData[lessonId];

    // 檢查解鎖狀態
    window.onload = function() {
        if (localStorage.getItem(`level4_unlocked_lesson_${lessonId}`) !== 'true') {
            document.getElementById('lock-screen').style.display = 'flex';
        }
        initGame();
    };

    function initGame() {
        document.getElementById('lesson-title').innerText = currentData.title;
        const wordBank = document.getElementById('wordBank');
        [...currentData.words].sort(() => Math.random() - 0.5).forEach(w => {
            const div = document.createElement('div');
            div.className = 'word-item'; div.innerText = w; div.draggable = true; div.id = 'word-' + w;
            div.addEventListener('dragstart', e => e.dataTransfer.setData('text', w));
            wordBank.appendChild(div);
        });

        const quizArea = document.getElementById('quizArea');
        currentData.questions.forEach((q, index) => {
            const parts = q.split('@');
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `${index + 1}. ${parts[0]} <div class="drop-zone" data-ans="${currentData.words[index]}"></div> ${parts[1]}`;
            quizArea.appendChild(qDiv);
        });

        setupDragAndDrop();
    }

    function setupDragAndDrop() {
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('over'));
            zone.addEventListener('drop', e => {
                e.preventDefault(); zone.classList.remove('over');
                const word = e.dataTransfer.getData('text');
                if (zone.innerText !== "") document.getElementById('word-' + zone.innerText).style.display = 'block';
                zone.innerText = word; zone.classList.add('filled');
                document.getElementById('word-' + word).style.display = 'none';
            });
            zone.onclick = () => {
                if (zone.innerText !== "") {
                    document.getElementById('word-' + zone.innerText).style.display = 'block';
                    zone.innerText = ""; zone.classList.remove('filled');
                }
            };
        });
    }

    function checkAll() {
        let correct = 0;
        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(z => {
            if (z.innerText === z.dataset.ans) {
                z.style.backgroundColor = "#2ecc71"; z.style.color = "white"; correct++;
            } else {
                z.style.backgroundColor = "#e74c3c"; z.style.color = "white";
            }
        });
        if (correct === zones.length) {
            alert("太強了！你完成了這一課所有的挑戰！");
            location.href = 'index.html';
        } else {
            alert("還有地方不對喔，再檢查一下紅色的格子！");
        }
    }
</script>
</body>
</html>
