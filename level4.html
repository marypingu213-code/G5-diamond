    };

    function initGame() {
        document.getElementById('lesson-title').innerText = currentData.title;
        const wordBank = document.getElementById('wordBank');
        [...currentData.words].sort(() => Math.random() - 0.5).forEach(w => {
            const div = document.createElement('div');
            div.className = 'word-item'; div.innerText = w; div.draggable = true; div.id = 'word-' + w;
            div.addEventListener('dragstart', e => e.dataTransfer.setData('text', w));
            wordBank.appendChild(div);
        });

        const quizArea = document.getElementById('quizArea');
        currentData.questions.forEach((q, index) => {
            const parts = q.split('@');
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `${index + 1}. ${parts[0]} <div class="drop-zone" data-ans="${currentData.words[index]}"></div> ${parts[1]}`;
            quizArea.appendChild(qDiv);
        });

        setupDragAndDrop();
    }

    function setupDragAndDrop() {
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('over'));
            zone.addEventListener('drop', e => {
                e.preventDefault(); zone.classList.remove('over');
                const word = e.dataTransfer.getData('text');
                if (zone.innerText !== "") document.getElementById('word-' + zone.innerText).style.display = 'block';
                zone.innerText = word; zone.classList.add('filled');
                document.getElementById('word-' + word).style.display = 'none';
            });
            zone.onclick = () => {
                if (zone.innerText !== "") {
                    document.getElementById('word-' + zone.innerText).style.display = 'block';
                    zone.innerText = ""; zone.classList.remove('filled');
                }
            };
        });
    }

    function checkAll() {
        let correct = 0;
        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(z => {
            if (z.innerText === z.dataset.ans) {
                z.style.backgroundColor = "#2ecc71"; z.style.color = "white"; correct++;
            } else {
                z.style.backgroundColor = "#e74c3c"; z.style.color = "white";
            }
        });
        if (correct === zones.length) {
            alert("太強了！你完成了這一課所有的挑戰！");
            location.href = 'index.html';
        } else {
            alert("還有地方不對喔，再檢查一下紅色的格子！");
