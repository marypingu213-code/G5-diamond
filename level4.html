<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>第五年級 第一課：Level 4 語詞我最行</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #2c3e50; color: white; text-align: center; }
        .game-container { background-color: #34495e; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; width: 80%; max-width: 800px; }
        .question { font-size: 22px; margin: 15px 0; text-align: left; background: #1a252f; padding: 12px; border-radius: 8px; border-left: 5px solid #3498db; }
        select { font-size: 18px; padding: 5px; border-radius: 5px; background: #3498db; color: white; font-weight: bold; cursor: pointer; }
        .check-btn { background-color: #f1c40f; color: #2c3e50; border: none; padding: 15px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .check-btn:hover { background-color: #f39c12; transform: scale(1.05); }
        
        /* 鎖定畫面樣式 */
        #lock-screen { background-color: #34495e; padding: 40px; border-radius: 20px; display: inline-block; margin-top: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="lock-screen" style="display:none;">
    <h1>🔒 尚未解鎖</h1>
    <p style="font-size: 20px;">請先完成 Level 3 的挑戰，才能進入這一關喔！</p>
    <button onclick="location.href='index.html'" style="padding:10px 25px; font-size: 18px; cursor: pointer; border-radius: 8px;">回大廳</button>
</div>

<div id="game-content" class="game-container">
    <h2>🚀 Level 4：語詞我最行 (後半)</h2>
    <p>挑戰更高難度的語詞填空：</p>
    <hr>
    
    <div class="question">1. 夏天運動完，喝一杯冰涼的（ <select id="q1"><option value="">?</option><option value="飲料">飲料</option><option value="標籤">標籤</option></select> ）最消暑了。</div>
    <div class="question">2. 這間餐廳佈置得很精緻，用餐的（ <select id="q2"><option value="">?</option><option value="氣氛">氣氛</option><option value="溶解">溶解</option></select> ）非常好。</div>
    <div class="question">3. 睡覺前，我會將故事書（ <select id="q3"><option value="">?</option><option value="闔上">闔上</option><option value="氣氛">氣氛</option></select> ），放在床頭櫃上。</div>
    <div class="question">4. 買衣服前，要先看清楚（ <select id="q4"><option value="">?</option><option value="標籤">標籤</option><option value="獎券">獎券</option></select> ）上的洗滌說明。</div>
    <div class="question">5. 把方糖放入熱水中攪拌，很快就會（ <select id="q5"><option value="">?</option><option value="溶解">溶解</option><option value="純粹">純粹</option></select> ）不見了。</div>
    <div class="question">6. 爸爸每天早晨都習慣喝一杯黑（ <select id="q6"><option value="">?</option><option value="咖啡">咖啡</option><option value="飲料">飲料</option></select> ）來提神。</div>
    <div class="question">7. 弟弟運氣很好，在尾牙活動中抽中了一張（ <select id="q7"><option value="">?</option><option value="獎券">獎券</option><option value="標籤">標籤</option></select> ）。</div>
    <div class="question">8. 這位小朋友的笑容非常（ <select id="q8"><option value="">?</option><option value="純粹">純粹</option><option value="闔上">闔上</option></select> ）可愛。</div>

    <button class="check-btn" onclick="checkFinal()">完成挑戰！</button>
</div>

<script>
    // 自動獲取目前的課程 ID
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lesson') || "1";

    // 檢查解鎖狀態
    window.onload = function() {
        // 重要修正：對應新的標籤 Key
        const storageKey = `level4_unlocked_lesson_${lessonId}`;
        
        if (localStorage.getItem(storageKey) !== 'true') {
            document.getElementById('game-content').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'block';
        }
    };

    function checkFinal() {
        const correct = { q1:"飲料", q2:"氣氛", q3:"闔上", q4:"標籤", q5:"溶解", q6:"咖啡", q7:"獎券", q8:"純粹" };
        let score = 0;
        let total = Object.keys(correct).length;

        for (let key in correct) {
            const el = document.getElementById(key);
            if (el.value === correct[key]) {
                score++;
                el.style.backgroundColor = "#27ae60";
            } else {
                el.style.backgroundColor = "#e74c3c";
            }
        }
        
        if (score === total) {
            alert("恭喜！你完成了第一課所有的語詞挑戰！");
        } else {
            alert("還有幾題選錯了，加油！檢查紅色的部分。");
        }
    }
</script>
</body>
</html>
